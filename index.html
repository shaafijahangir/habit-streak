<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0F0F13">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Streaks">
  <title>Streaks</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">

    <header class="app-header">
      <div class="header-left">
        <h1 class="app-title">today</h1>
        <p class="date-label" id="dateLabel"></p>
      </div>
      <div class="header-actions">
        <button class="btn-calendar" id="btnCalendar" aria-label="View calendar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </button>
        <button class="btn-edit" id="btnEdit" aria-label="Edit habits">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="habit-list" id="habitList"></main>

    <!-- Calendar panel -->
    <div class="calendar-panel" id="calendarPanel" hidden>
      <nav class="calendar-nav">
        <button class="btn-nav" id="btnPrevMonth" aria-label="Previous month">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="calendar-month-label" id="calMonthLabel"></span>
        <button class="btn-nav" id="btnNextMonth" aria-label="Next month">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </nav>
      <div class="calendar-grid" id="calGrid"></div>
      <div class="calendar-streaks" id="calStreaks"></div>
    </div>

    <!-- Edit panel -->
    <div class="edit-panel" id="editPanel" hidden>
      <div class="edit-header">
        <h2 class="edit-title">Edit Habits</h2>
        <button class="btn-done" id="btnDone">Done</button>
      </div>
      <ul class="edit-list" id="editList"></ul>
      <div class="add-habit-row">
        <input
          type="text"
          class="add-input"
          id="addInput"
          placeholder="New habit…"
          maxlength="30"
          autocomplete="off"
          spellcheck="false"
        >
        <button class="btn-add" id="btnAdd">Add</button>
      </div>
    </div>

  </div>

  <canvas id="confettiCanvas"></canvas>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
